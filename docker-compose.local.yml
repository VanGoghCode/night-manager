version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: night_manager
      POSTGRES_PASSWORD: night_manager
      POSTGRES_DB: night_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U night_manager -d night_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
